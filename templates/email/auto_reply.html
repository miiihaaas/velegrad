{% load i18n %}<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Hvala na Vašem upitu" %} — Velegrad Estate</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f3f0; font-family:Georgia,'Times New Roman',serif; color:#2b2b2b;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f3f0; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#ffffff; border:1px solid #e0e3db;">
          <!-- Header / brand -->
          <tr>
            <td align="center" style="background-color:#4A5240; padding:36px 32px;">
              <span style="color:#C9A96E; font-size:14px; letter-spacing:4px; text-transform:uppercase;">Velegrad Estate</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px 36px;">
              <h1 style="margin:0 0 20px; font-size:24px; font-weight:normal; color:#4A5240;">{% trans "Hvala na Vašem upitu" %}</h1>
              {# {{ name }} je user-kontrolisan; Django auto-escape je aktivan (i unutar blocktrans), pa se npr. <script> renderuje kao &lt;script&gt; — bez |safe (XSS pokriven testom). #}
              <p style="margin:0 0 16px; font-size:16px; line-height:1.7;">{% blocktrans %}Poštovani/a {{ name }},{% endblocktrans %}</p>
              <p style="margin:0 0 16px; font-size:16px; line-height:1.7;">{% trans "Hvala Vam na upitu upućenom Velegrad Estate. Vaša poruka je primljena i naš savetnik će Vam se uskoro javiti." %}</p>
              <p style="margin:0 0 24px; font-size:16px; line-height:1.7;">{% trans "Cenimo Vaše poverenje i radujemo se prilici da Vam pomognemo u pronalaženju izuzetne nekretnine." %}</p>
              <p style="margin:0 0 4px; font-size:16px; line-height:1.7;">{% trans "Srdačan pozdrav," %}</p>
              <p style="margin:0; font-size:16px; line-height:1.7; color:#4A5240;"><strong>{% trans "Tim Velegrad Estate" %}</strong></p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="background-color:#f4f3f0; padding:24px 32px; border-top:1px solid #e0e3db;">
              <p style="margin:0; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#C9A96E;">Velegrad Estate</p>
              <p style="margin:6px 0 0; font-size:12px; color:#9b9b9b;">{% trans "Privatno savetovanje za izuzetne nekretnine" %}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
