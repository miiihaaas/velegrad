{% comment %}
  Amenity ikona po slug-u (PropertyFeature.icon). Očekuje promenljivu `icon`.
  Stil prati ostatak sajta: viewBox 0 0 24 24, stroke=currentColor, width 1.5.
  Nepoznat/prazan slug → generička ikona (kvačica u krugu).
{% endcomment %}
<svg class="amenity-item__icon icon-{{ icon }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{% if icon == "air-conditioning" %}
  <rect x="3" y="5" width="18" height="7" rx="1.5"/><line x1="6" y1="8.5" x2="18" y2="8.5"/><path d="M7 16c0 1.2 1 1.2 1 2.4M11 16c0 1.4 1 1.4 1 2.8M15 16c0 1.2 1 1.2 1 2.4"/>
{% elif icon == "underfloor-heating" %}
  <line x1="3" y1="20" x2="21" y2="20"/><path d="M7 16c0-2-2-2-2-4s2-2 2-4M12 16c0-2-2-2-2-4s2-2 2-4M17 16c0-2-2-2-2-4s2-2 2-4"/>
{% elif icon == "fireplace" %}
  <path d="M12 3c2 3 4 5 4 8a4 4 0 1 1-8 0c0-2 1-3 2-4 0 1.5 1 2 2 2-1-2-1-4 0-6z"/>
{% elif icon == "kitchen" %}
  <rect x="3" y="4" width="18" height="16" rx="1.5"/><circle cx="8" cy="9" r="2"/><circle cx="16" cy="9" r="2"/><line x1="6" y1="15" x2="18" y2="15"/>
{% elif icon == "wardrobe" %}
  <path d="M12 6a1.5 1.5 0 1 1 1.5 1.5c-.8 0-1.5.6-1.5 1.5v.5"/><path d="M12 10 4.5 15.6a1 1 0 0 0 .6 1.9h13.8a1 1 0 0 0 .6-1.9L12 10z"/>
{% elif icon == "smart-home" %}
  <path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/><path d="M9.3 14.3a3.8 3.8 0 0 1 5.4 0"/><path d="M10.8 16a1.7 1.7 0 0 1 2.4 0"/><circle cx="12" cy="17.6" r="0.55" fill="currentColor" stroke="none"/>
{% elif icon == "terrace" %}
  <line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="8" x2="3" y2="20"/><line x1="21" y1="8" x2="21" y2="20"/><line x1="3" y1="14" x2="21" y2="14"/><line x1="9" y1="8" x2="9" y2="14"/><line x1="15" y1="8" x2="15" y2="14"/>
{% elif icon == "pool" %}
  <path d="M3 16c1.5 0 1.5 1.4 3 1.4s1.5-1.4 3-1.4 1.5 1.4 3 1.4 1.5-1.4 3-1.4 1.5 1.4 3 1.4"/><path d="M3 19.5c1.5 0 1.5 1.4 3 1.4s1.5-1.4 3-1.4 1.5 1.4 3 1.4 1.5-1.4 3-1.4 1.5 1.4 3 1.4"/><path d="M8 14V6a1.5 1.5 0 0 1 3 0v8"/><line x1="8" y1="10" x2="11" y2="10"/>
{% elif icon == "garden" %}
  <path d="M12 21v-6"/><path d="M12 15a4 4 0 0 0 3-6.6A3.5 3.5 0 0 0 12 4a3.5 3.5 0 0 0-3 4.4A4 4 0 0 0 12 15z"/>
{% elif icon == "view" %}
  <path d="M3 19 9 9l4 6 2.5-3.5L21 19z"/><circle cx="7" cy="7" r="2"/>
{% elif icon == "bbq" %}
  <path d="M5 11a7 7 0 0 1 14 0"/><line x1="5" y1="11" x2="19" y2="11"/><line x1="8" y1="7.5" x2="16" y2="7.5"/><path d="M8 13l-1 6M16 13l1 6M12 14v5"/>
{% elif icon == "elevator" %}
  <rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M8.5 11 10 8.5 11.5 11"/><path d="M13 13.5 14.5 16 16 13.5"/><line x1="12" y1="6" x2="12" y2="18"/>
{% elif icon == "garage" %}
  <path d="M4 20V9l8-5 8 5v11"/><path d="M8 20v-6a4 4 0 0 1 8 0v6"/>
{% elif icon == "parking" %}
  <rect x="4" y="4" width="16" height="16" rx="2"/><path d="M10 16V8h3a2.5 2.5 0 0 1 0 5h-3"/>
{% elif icon == "concierge" %}
  <line x1="4" y1="20" x2="20" y2="20"/><path d="M6 17a6 6 0 0 1 12 0"/><line x1="5" y1="17" x2="19" y2="17"/><line x1="12" y1="8" x2="12" y2="11"/><circle cx="12" cy="7" r="1"/>
{% elif icon == "cctv" %}
  <path d="M3 7.5l13-2.5 1 4-13 3z"/><path d="M5.5 12.2V15a2 2 0 0 0 2 2h2"/><line x1="16.5" y1="7.5" x2="20" y2="6"/><circle cx="20.5" cy="5.8" r="1.2"/>
{% elif icon == "storage" %}
  <path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/>
{% elif icon == "registered" %}
  <path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 14l2 2 4-4"/>
{% elif icon == "no-encumbrance" %}
  <path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 11.5l2 2 4-4"/>
{% elif icon == "permit" %}
  <path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="14" x2="13" y2="14"/><circle cx="15" cy="16.5" r="2"/>
{% elif icon == "wine-cellar" %}
  <path d="M9 3h2v4l1 2v9a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V9l1-2z"/><line x1="8" y1="12" x2="11" y2="12"/><path d="M14 4h4l-.4 4a1.6 1.6 0 0 1-3.2 0z"/><line x1="16" y1="9.5" x2="16" y2="19"/><line x1="14.5" y1="19" x2="17.5" y2="19"/>
{% elif icon == "security" %}
  <path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><circle cx="12" cy="11" r="1.5"/><line x1="12" y1="12.5" x2="12" y2="15"/>
{% elif icon == "gym" %}
  <line x1="3" y1="12" x2="5.5" y2="12"/><rect x="5.5" y="8.5" width="2.5" height="7" rx="0.6"/><line x1="8" y1="12" x2="16" y2="12"/><rect x="16" y="8.5" width="2.5" height="7" rx="0.6"/><line x1="18.5" y1="12" x2="21" y2="12"/>
{% elif icon == "jacuzzi" %}
  <path d="M4 11h16v4a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3z"/><path d="M6 11V8a2 2 0 0 1 4 0"/><circle cx="13" cy="6" r="0.55" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8" r="0.55" fill="currentColor" stroke="none"/><circle cx="17" cy="5.5" r="0.55" fill="currentColor" stroke="none"/>
{% elif icon == "intercom" %}
  <rect x="7" y="3" width="10" height="18" rx="1.5"/><rect x="9.5" y="6" width="5" height="4" rx="0.5"/><circle cx="10.6" cy="14" r="0.8" fill="currentColor" stroke="none"/><circle cx="13.4" cy="14" r="0.8" fill="currentColor" stroke="none"/><circle cx="10.6" cy="17" r="0.8" fill="currentColor" stroke="none"/><circle cx="13.4" cy="17" r="0.8" fill="currentColor" stroke="none"/>
{% elif icon == "sauna" %}
  <line x1="4" y1="18" x2="20" y2="18"/><path d="M6 18a6 4 0 0 1 12 0"/><path d="M9 11c0-1.6-1.5-1.6-1.5-3.2M12 11c0-1.6-1.5-1.6-1.5-3.2M15 11c0-1.6-1.5-1.6-1.5-3.2"/>
{% else %}
  <circle cx="12" cy="12" r="8"/><path d="M9 12l2 2 4-4"/>
{% endif %}
</svg>
