[pytest]
python_files = test_*.py
testpaths = tests
# Story 1.1 RED-phase harness.
#
# The CONTRACT settings module is `config.settings.dev` (asserted by the tests and
# documented in the interface contract). We deliberately do NOT set
# DJANGO_SETTINGS_MODULE here: while the scaffold does not yet exist, pytest-django
# would otherwise abort the ENTIRE session at startup ("No module named 'config'")
# and no individual test would run. Instead each test that needs Django configures
# it itself (see `_configured_django` in test_project_setup.py), so every test
# fails for its OWN, clearly-attributable reason during the RED phase.
#
# GREEN-phase note for Dev: pytest-django IS installed in this venv. Do NOT add
#   DJANGO_SETTINGS_MODULE = config.settings.dev
# here. The tests already pin that module internally (see `_configured_django`),
# and the one live-DB test (`test_database_connection_smoke`) deliberately owns its
# OWN connection and is NOT marked @pytest.mark.django_db. If you set
# DJANGO_SETTINGS_MODULE in this file, pytest-django activates and BLOCKS that
# unmarked DB access ("Database access not allowed"), so the smoke test would always
# skip even when a real Postgres is up. Leaving DJANGO_SETTINGS_MODULE unset keeps
# pytest-django dormant, so the smoke test runs against a live DB when one is reachable
# and skips (never errors) otherwise.
#
# The `markers` entry below is retained only to silence pytest's unknown-marker
# warning for any future test that DOES opt into pytest-django's db fixture.
markers =
    django_db: mark a test that requires pytest-django's managed test database.
