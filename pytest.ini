[pytest]
python_files = test_*.py
testpaths = tests
# Story 1.2 activates pytest-django against the SQLite TEST settings.
#
# Story 1.1 deliberately left DJANGO_SETTINGS_MODULE UNSET so pytest-django stayed
# dormant (the 1.1 tests self-configure Django against `config.settings.dev` via the
# `_configured_django` helper, and the live-DB smoke test owned its own connection).
#
# Story 1.2 adds model tests that need a real test database (singleton enforcement,
# slug auto-gen, behavior). The local/CI environment has NO Postgres, so we point
# pytest-django at `config.settings.test` — a base-inherited settings module whose
# ONLY override is DATABASES => in-memory SQLite. This lets @pytest.mark.django_db
# tests create/destroy a throwaway test DB with zero external dependencies.
#
# Impact on the 1.1 suite (verified): with pytest-django active and the live settings
# now being the SQLite test override, `_configured_django("dev")` returns the
# already-configured (test) settings instead of dev. All 1.1 facts still hold EXCEPT
# `test_databases_configured_for_postgresql`, which was reading the engine from the
# LIVE settings; it has been adapted (logged TEST_MODIFICATION) to read the engine
# from the freshly-imported `config.settings.base` module — the genuine project DB,
# built from DATABASE_URL — so its AC6 intent (project => postgresql) is preserved.
#
# The 1.1 live-DB smoke test (`test_database_connection_smoke`) is NOT marked
# @pytest.mark.django_db; under active pytest-django its unmarked DB access raises
# "Database access not allowed", which its broad try/except catches and turns into a
# pytest.skip(). It therefore still SKIPS in the no-Postgres world (intent preserved:
# it never hard-errors). The new @django_db model tests now exercise the DB layer
# (on SQLite) in its place, so the DB plumbing is still verified.
DJANGO_SETTINGS_MODULE = config.settings.test

markers =
    django_db: mark a test that requires pytest-django's managed test database.
