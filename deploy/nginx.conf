# Nginx vhost za Velegrad CMS (Story 6.4 AC1/AC6).
# Versionisani ŠABLON (bez kredencijala). Na VPS-u:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/velegrad
#   sudo ln -s /etc/nginx/sites-available/velegrad /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Certbot (AC2) dodaje 443 server blok + HTTP->HTTPS redirect pri izdavanju sertifikata.

upstream velegrad_app {
    server unix:/run/velegrad/gunicorn.sock;
}

server {
    listen 80;
    server_name velegradestate.rs www.velegradestate.rs;

    client_max_body_size 25M;

    # Gzip kompresija tekstualnih odgovora (AC1/T4). Slike (JPEG/PNG/WebP) su već
    # komprimovane pa se NE gzip-uju (gzip_types ne uključuje image/*).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Statika servirana direktno sa diska (collectstatic -> STATIC_ROOT).
    location /static/ {
        alias /srv/velegrad/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Media (upload-ovane slike) servirana direktno sa diska.
    location /media/ {
        alias /srv/velegrad/media/;
        access_log off;
        expires 30d;
    }

    # Sve ostalo ide na Gunicorn preko Unix socket-a.
    location / {
        proxy_pass http://velegrad_app;
        proxy_set_header Host $host;
        # X-Forwarded-Proto: SECURE_PROXY_SSL_HEADER zavisi od njega (HTTPS detekcija).
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-Forwarded-For: stvarni klijentski IP za non-spoofable rate-limit (AC6b).
        # $proxy_add_x_forwarded_for dodaje connecting hop kao poslednji u lancu.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }
}
